services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fastdelivery-rabbitmq
    ports:
      - "5672:5672"     # AMQP (aplicação)
      - "15672:15672"   # UI de gestão (http://localhost:15672, guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq   # persiste filas/mensagens duráveis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
